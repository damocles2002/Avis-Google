<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avis en ligne</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* La méthode qui marchait sur ton ancien code */
        .star { 
            cursor: pointer; 
            font-size: 3rem; 
            color: #cbd5e1; 
            padding: 0 5px;
            display: inline-block;
        }
        .star.active { color: #fbbf24; }
        .category-card { background: white; padding: 1rem; border-radius: 1rem; border: 1px solid #f1f5f9; margin-bottom: 1rem; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex items-center justify-center p-4 font-sans text-center">

    <div class="bg-white p-8 rounded-3xl shadow-2xl max-w-md w-full border border-slate-100">
        <h2 class="text-indigo-600 font-black text-2xl mb-2 tracking-tighter uppercase">Avis en ligne</h2>
        <h1 id="nom-resto" class="text-xl font-bold text-slate-900 mb-6 italic">Chargement...</h1>

        <div id="evaluation-section">
            <div class="category-card">
                <span class="block text-xs font-bold uppercase text-slate-400 mb-2">🍳 Cuisine</span>
                <div class="flex justify-around" id="stars-cuisine">
                    <span class="star" onclick="noter('cuisine', 1)">★</span>
                    <span class="star" onclick="noter('cuisine', 2)">★</span>
                    <span class="star" onclick="noter('cuisine', 3)">★</span>
                    <span class="star" onclick="noter('cuisine', 4)">★</span>
                    <span class="star" onclick="noter('cuisine', 5)">★</span>
                </div>
            </div>

            <div class="category-card">
                <span class="block text-xs font-bold uppercase text-slate-400 mb-2">✨ Ambiance</span>
                <div class="flex justify-around" id="stars-ambiance">
                    <span class="star" onclick="noter('ambiance', 1)">★</span>
                    <span class="star" onclick="noter('ambiance', 2)">★</span>
                    <span class="star" onclick="noter('ambiance', 3)">★</span>
                    <span class="star" onclick="noter('ambiance', 4)">★</span>
                    <span class="star" onclick="noter('ambiance', 5)">★</span>
                </div>
            </div>

            <div class="category-card">
                <span class="block text-xs font-bold uppercase text-slate-400 mb-2">👨‍🍳 Service</span>
                <div class="flex justify-around" id="stars-service">
                    <span class="star" onclick="noter('service', 1)">★</span>
                    <span class="star" onclick="noter('service', 2)">★</span>
                    <span class="star" onclick="noter('service', 3)">★</span>
                    <span class="star" onclick="noter('service', 4)">★</span>
                    <span class="star" onclick="noter('service', 5)">★</span>
                </div>
            </div>

            <button id="btn-valider" onclick="verifierMoyenne()" 
                class="w-full bg-slate-200 text-slate-400 font-bold py-4 rounded-2xl mt-4 cursor-not-allowed" disabled>
                Valider mon avis
            </button>
        </div>

        <div id="form-negatif" class="hidden text-left">
            <textarea id="commentaire" class="w-full border-2 border-slate-200 rounded-xl p-4 focus:border-indigo-500 outline-none mb-4 text-sm" rows="4" placeholder="Que pouvons-nous améliorer ?"></textarea>
            <button onclick="envoyerAvisInterne()" class="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl">Envoyer mon retour</button>
        </div>

        <div id="success-message" class="hidden py-10 font-bold text-green-600">
            ✅ Merci ! Avis bien reçu.
        </div>
    </div>

    <script>
        const SB_URL = "https://urpfgiaocxfnyfdoiapf.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVycGZnaWFvY3hmbnlmZG9pYXBmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTI0ODgzMzgsImV4cCI6MjAyODA0NDMzOH0.pW3D38zI0S6S8A69_0j_N9l3D38zI0S6S8A69_0j_N9l"; 
        const supabase = window.supabase.createClient(SB_URL, SB_KEY);

        let notes = { cuisine: 0, ambiance: 0, service: 0 };
        let googleUrl = "";
        let idResto = "";

        async function init() {
            const params = new URLSearchParams(window.location.search);
            idResto = params.get('id');
            const { data } = await supabase.from('restaurants').select('nom, google_maps_url').eq('id', idResto).single();
            if (data) { 
                document.getElementById('nom-resto').innerText = data.nom; 
                googleUrl = data.google_maps_url; 
            }
        }

        // C'est cette fonction qui gérait les étoiles sur ton ancien code
        function noter(cat, valeur) {
            notes[cat] = valeur;
            
            // On cible spécifiquement le conteneur de la catégorie
            const container = document.getElementById('stars-' + cat);
            const stars = container.getElementsByClassName('star');
            
            for (let i = 0; i < stars.length; i++) {
                if (i < valeur) {
                    stars[i].classList.add('active');
                } else {
                    stars[i].classList.remove('active');
                }
            }
            
            // On active le bouton seulement si tout est rempli
            if (notes.cuisine > 0 && notes.ambiance > 0 && notes.service > 0) {
                const btn = document.getElementById('btn-valider');
                btn.disabled = false;
                btn.classList.remove('bg-slate-200', 'text-slate-400', 'cursor-not-allowed');
                btn.classList.add('bg-indigo-600', 'text-white', 'shadow-lg');
            }
        }

        function verifierMoyenne() {
            const moy = (notes.cuisine + notes.ambiance + notes.service) / 3;
            if (moy >= 4) {
                window.location.href = googleUrl; 
            } else {
                document.getElementById('evaluation-section').classList.add('hidden');
                document.getElementById('form-negatif').classList.remove('hidden');
            }
        }

        async function envoyerAvisInterne() {
            const txt = document.getElementById('commentaire').value;
            const detail = `Cuisine: ${notes.cuisine} | Ambiance: ${notes.ambiance} | Service: ${notes.service}`;
            
            await supabase.from('avis_internes').insert([{ 
                id_restaurant: idResto, 
                note: (notes.cuisine + notes.ambiance + notes.service) / 3, 
                commentaire: detail + " | Msg: " + txt 
            }]);

            document.getElementById('form-negatif').classList.add('hidden');
            document.getElementById('success-message').classList.remove('hidden');
        }

        init();
    </script>
</body>
</html>

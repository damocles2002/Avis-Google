<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Avis en ligne</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .rating { display: flex; flex-direction: row-reverse; justify-content: center; gap: 12px; }
        .rating input { display: none; }
        .rating label { cursor: pointer; font-size: 3.2rem; color: #cbd5e1; transition: color 0.1s; }
        .rating label:before { content: '★'; }
        .rating input:checked ~ label { color: #fbbf24; }
        .card { background: white; padding: 1.25rem; border-radius: 1.5rem; border: 1px solid #e2e8f0; margin-bottom: 1rem; }
        body { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 text-center font-sans">

    <div class="w-full max-w-md bg-white p-6 rounded-3xl shadow-xl border border-slate-100">
        <h2 class="text-indigo-600 font-black text-2xl uppercase mb-1 tracking-tighter">Avis en ligne</h2>
        <h1 id="nom-resto" class="text-lg font-bold text-slate-800 mb-6 italic">Chargement...</h1>

        <div id="section-vote">
            <div class="card">
                <span class="text-[10px] font-bold uppercase text-slate-400 block mb-1">🍳 Cuisine</span>
                <div class="rating">
                    <input type="radio" name="c" id="c5" value="5" onchange="activerBouton()"><label for="c5"></label>
                    <input type="radio" name="c" id="c4" value="4" onchange="activerBouton()"><label for="c4"></label>
                    <input type="radio" name="c" id="c3" value="3" onchange="activerBouton()"><label for="c3"></label>
                    <input type="radio" name="c" id="c2" value="2" onchange="activerBouton()"><label for="c2"></label>
                    <input type="radio" name="c" id="c1" value="1" onchange="activerBouton()"><label for="c1"></label>
                </div>
            </div>

            <div class="card">
                <span class="text-[10px] font-bold uppercase text-slate-400 block mb-1">✨ Ambiance</span>
                <div class="rating">
                    <input type="radio" name="a" id="a5" value="5" onchange="activerBouton()"><label for="a5"></label>
                    <input type="radio" name="a" id="a4" value="4" onchange="activerBouton()"><label for="a4"></label>
                    <input type="radio" name="a" id="a3" value="3" onchange="activerBouton()"><label for="a3"></label>
                    <input type="radio" name="a" id="a2" value="2" onchange="activerBouton()"><label for="a2"></label>
                    <input type="radio" name="a" id="a1" value="1" onchange="activerBouton()"><label for="a1"></label>
                </div>
            </div>

            <div class="card">
                <span class="text-[10px] font-bold uppercase text-slate-400 block mb-1">👨‍🍳 Service</span>
                <div class="rating">
                    <input type="radio" name="s" id="s5" value="5" onchange="activerBouton()"><label for="s5"></label>
                    <input type="radio" name="s" id="s4" value="4" onchange="activerBouton()"><label for="s4"></label>
                    <input type="radio" name="s" id="s3" value="3" onchange="activerBouton()"><label for="s3"></label>
                    <input type="radio" name="s" id="s2" value="2" onchange="activerBouton()"><label for="s2"></label>
                    <input type="radio" name="s" id="s1" value="1" onchange="activerBouton()"><label for="s1"></label>
                </div>
            </div>

            <button id="btn-valider" onclick="validerAvis()" 
                class="w-full bg-slate-200 text-slate-400 font-bold py-4 rounded-2xl mt-4 transition-all" disabled>
                Valider mon avis
            </button>
        </div>

        <div id="section-reclamation" class="hidden text-left">
            <div class="bg-amber-50 border-l-4 border-amber-400 p-4 mb-4">
                <p class="text-amber-800 text-sm font-bold">Dites-nous en plus</p>
                <p class="text-amber-700 text-xs italic">Votre retour sera envoyé directement à la direction.</p>
            </div>
            <textarea id="commentaire" class="w-full border-2 border-slate-200 rounded-xl p-4 mb-4 outline-none focus:border-indigo-500" rows="4" placeholder="Qu'est-ce qui n'a pas été ?"></textarea>
            <button onclick="envoyerReclamation()" class="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl">Envoyer mon message</button>
        </div>

        <div id="section-succes" class="hidden py-10 font-bold text-green-600">
            <div class="text-5xl mb-4">✅</div>
            Merci ! Votre message a bien été transmis.
        </div>
    </div>

    <script>
        // CONFIGURATION SUPABASE
        const SB_URL = "https://urpfgiaocxfnyfdoiapf.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVycGZnaWFvY3hmbnlmZG9pYXBmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTI0ODgzMzgsImV4cCI6MjAyODA0NDMzOH0.pW3D38zI0S6S8A69_0j_N9l3D38zI0S6S8A69_0j_N9l";
        const supabase = window.supabase.createClient(SB_URL, SB_KEY);
        
        let urlGoogleAvis = ""; 
        let idRestaurant = "";

        // INITIALISATION : Charger les infos du resto
        async function init() {
            const params = new URLSearchParams(window.location.search);
            idRestaurant = params.get('id');
            const { data, error } = await supabase.from('restaurants').select('nom, google_maps_url').eq('id', idRestaurant).single();
            if (data) { 
                document.getElementById('nom-resto').innerText = data.nom; 
                urlGoogleAvis = data.google_maps_url; 
            }
        }

        // VÉRIFIER SI TOUT EST NOTÉ
        function activerBouton() {
            const c = document.querySelector('input[name="c"]:checked');
            const a = document.querySelector('input[name="a"]:checked');
            const s = document.querySelector('input[name="s"]:checked');
            if (c && a && s) {
                const btn = document.getElementById('btn-valider');
                btn.disabled = false;
                btn.className = "w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl mt-4 shadow-lg active:scale-95";
            }
        }

        // LOGIQUE DE REDIRECTION (Comme l'ancien code)
        function validerAvis() {
            const nC = parseInt(document.querySelector('input[name="c"]:checked').value);
            const nA = parseInt(document.querySelector('input[name="a"]:checked').value);
            const nS = parseInt(document.querySelector('input[name="s"]:checked').value);
            const moyenne = (nC + nA + nS) / 3;

            if (moyenne >= 4) {
                // REDIRECTION GOOGLE AVIS (Client content)
                window.location.href = urlGoogleAvis;
            } else {
                // PASSER AU FORMULAIRE INTERNE (Client déçu)
                document.getElementById('section-vote').classList.add('hidden');
                document.getElementById('section-reclamation').classList.remove('hidden');
            }
        }

        // ENVOYER LA RÉCLAMATION DANS SUPABASE
        async function envoyerReclamation() {
            const nC = document.querySelector('input[name="c"]:checked').value;
            const nA = document.querySelector('input[name="a"]:checked').value;
            const nS = document.querySelector('input[name="s"]:checked').value;
            const msg = document.getElementById('commentaire').value;
            const moy = (parseInt(nC) + parseInt(nA) + parseInt(nS)) / 3;

            const { error } = await supabase.from('avis_internes').insert([{ 
                id_restaurant: idRestaurant, 
                note: moy, 
                commentaire: `Détail : Cuisine ${nC}, Ambiance ${nA}, Service ${nS} | Message : ${msg}`
            }]);

            if (!error) {
                document.getElementById('section-reclamation').classList.add('hidden');
                document.getElementById('section-succes').classList.remove('hidden');
            }
        }

        init();
    </script>
</body>
</html>

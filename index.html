<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Avis Client</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* SYSTEME D'ETOILES RADIALES */
        .rating { display: flex; flex-direction: row-reverse; justify-content: center; gap: 10px; }
        .rating input { display: none; }
        .rating label { cursor: pointer; font-size: 3.5rem; color: #cbd5e1; transition: all 0.2s; }
        .rating label:before { content: '★'; }
        .rating input:checked ~ label { color: #fbbf24; }
        
        /* DESIGN DES CARTES */
        .card { background: white; padding: 1.5rem; border-radius: 1.5rem; border: 1px solid #f1f5f9; margin-bottom: 1rem; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        
        /* FIX MOBILE CLIC */
        body { -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        .btn-active { background-color: #4f46e5 !important; color: white !important; shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.4); opacity: 1 !important; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 text-center font-sans">

    <div class="w-full max-w-md bg-white p-6 rounded-[2.5rem] shadow-2xl border border-slate-100">
        <h2 class="text-indigo-600 font-black text-2xl uppercase tracking-tighter mb-1">Votre avis</h2>
        <h1 id="nom-resto" class="text-lg font-bold text-slate-800 mb-8 italic">Chargement...</h1>

        <div id="section-vote">
            <div class="card">
                <span class="text-[11px] font-black uppercase text-slate-400 block mb-2">🍳 Cuisine</span>
                <div class="rating">
                    <input type="radio" name="c" id="c5" value="5" onchange="checkStars()"><label for="c5"></label>
                    <input type="radio" name="c" id="c4" value="4" onchange="checkStars()"><label for="c4"></label>
                    <input type="radio" name="c" id="c3" value="3" onchange="checkStars()"><label for="c3"></label>
                    <input type="radio" name="c" id="c2" value="2" onchange="checkStars()"><label for="c2"></label>
                    <input type="radio" name="c" id="c1" value="1" onchange="checkStars()"><label for="c1"></label>
                </div>
            </div>

            <div class="card">
                <span class="text-[11px] font-black uppercase text-slate-400 block mb-2">✨ Ambiance</span>
                <div class="rating">
                    <input type="radio" name="a" id="a5" value="5" onchange="checkStars()"><label for="a5"></label>
                    <input type="radio" name="a" id="a4" value="4" onchange="checkStars()"><label for="a4"></label>
                    <input type="radio" name="a" id="a3" value="3" onchange="checkStars()"><label for="a3"></label>
                    <input type="radio" name="a" id="a2" value="2" onchange="checkStars()"><label for="a2"></label>
                    <input type="radio" name="a" id="a1" value="1" onchange="checkStars()"><label for="a1"></label>
                </div>
            </div>

            <div class="card">
                <span class="text-[11px] font-black uppercase text-slate-400 block mb-2">👨‍🍳 Service</span>
                <div class="rating">
                    <input type="radio" name="s" id="s5" value="5" onchange="checkStars()"><label for="s5"></label>
                    <input type="radio" name="s" id="s4" value="4" onchange="checkStars()"><label for="s4"></label>
                    <input type="radio" name="s" id="s3" value="3" onchange="checkStars()"><label for="s3"></label>
                    <input type="radio" name="s" id="s2" value="2" onchange="verifierFormulaire()"><label for="s2"></label>
                    <input type="radio" name="s" id="s1" value="1" onchange="checkStars()"><label for="s1"></label>
                </div>
            </div>

            <button id="btn-valider" onclick="analyserNote()" 
                class="w-full bg-slate-100 text-slate-300 font-bold py-5 rounded-2xl mt-4 opacity-50 cursor-not-allowed transition-all duration-300" disabled>
                Valider mon avis
            </button>
        </div>

        <div id="section-reclamation" class="hidden text-left">
            <div class="bg-indigo-50 border-l-4 border-indigo-500 p-4 mb-4">
                <p class="text-indigo-900 text-sm font-bold">Merci pour votre retour.</p>
                <p class="text-indigo-700 text-xs">Dites-nous comment nous améliorer :</p>
            </div>
            <textarea id="msg-prive" class="w-full border-2 border-slate-200 rounded-2xl p-4 mb-4 focus:border-indigo-500 outline-none" rows="4" placeholder="Votre message..."></textarea>
            <button onclick="envoyerFeedback()" class="w-full bg-slate-900 text-white font-bold py-5 rounded-2xl shadow-lg">Envoyer à la direction</button>
        </div>

        <div id="section-merci" class="hidden py-10 font-bold text-green-600">
            <div class="text-6xl mb-4">✅</div>
            Merci ! Votre avis a été pris en compte.
        </div>
    </div>

    <script>
        const SB_URL = "https://urpfgiaocxfnyfdoiapf.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVycGZnaWFvY3hmbnlmZG9pYXBmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTI0ODgzMzgsImV4cCI6MjAyODA0NDMzOH0.pW3D38zI0S6S8A69_0j_N9l3D38zI0S6S8A69_0j_N9l";
        const supabase = window.supabase.createClient(SB_URL, SB_KEY);
        
        let targetGoogle = ""; 
        let currentId = "";

        // 1. CHARGEMENT INITIAL
        async function init() {
            const urlParams = new URLSearchParams(window.location.search);
            currentId = urlParams.get('id');
            
            if(!currentId) {
                document.getElementById('nom-resto').innerText = "Bienvenue !";
                return;
            }

            const { data, error } = await supabase.from('restaurants').select('nom, google_maps_url').eq('id', currentId).single();
            
            if (data) { 
                document.getElementById('nom-resto').innerText = data.nom; 
                targetGoogle = data.google_maps_url; 
            } else {
                document.getElementById('nom-resto').innerText = "Restaurant partenaire";
            }
        }

        // 2. VERIFIER LES ETOILES (Active le bouton)
        function checkStars() {
            const c = document.querySelector('input[name="c"]:checked');
            const a = document.querySelector('input[name="a"]:checked');
            const s = document.querySelector('input[name="s"]:checked');
            
            const btn = document.getElementById('btn-valider');

            if (c && a && s) {
                btn.disabled = false;
                btn.classList.add('btn-active');
            }
        }

        // 3. ANALYSE ET REDIRECTION
        function analyserNote() {
            const nC = parseInt(document.querySelector('input[name="c"]:checked').value);
            const nA = parseInt(document.querySelector('input[name="a"]:checked').value);
            const nS = parseInt(document.querySelector('input[name="s"]:checked').value);
            const moy = (nC + nA + nS) / 3;

            if (moy >= 4) {
                // REDIRECTION GOOGLE
                if(targetGoogle) {
                    window.location.href = targetGoogle;
                } else {
                    alert("Merci pour votre note !");
                }
            } else {
                // FORMULAIRE INTERNE
                document.getElementById('section-vote').classList.add('hidden');
                document.getElementById('section-reclamation').classList.remove('hidden');
            }
        }

        // 4. ENVOI SUPABASE
        async function envoyerFeedback() {
            const nC = document.querySelector('input[name="c"]:checked').value;
            const nA = document.querySelector('input[name="a"]:checked').value;
            const nS = document.querySelector('input[name="s"]:checked').value;
            const txt = document.getElementById('msg-prive').value;
            const moy = (parseInt(nC) + parseInt(nA) + parseInt(nS)) / 3;

            await supabase.from('avis_internes').insert([{ 
                id_restaurant: currentId || "inconnu", 
                note: moy, 
                commentaire: `C:${nC} A:${nA} S:${nS} | Msg: ${txt}`
            }]);

            document.getElementById('section-reclamation').classList.add('hidden');
            document.getElementById('section-merci').classList.remove('hidden');
        }

        init();
    </script>
</body>
</html>
